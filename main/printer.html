<!--
  @file printer.html
  @brief USB ESC/POS Printer Manager Web Interface
  
  This HTML file provides a comprehensive web interface for controlling USB thermal printers.
  
  Features:
  - Real-time printer connection status indicator
  - Text printing with character limit validation
  - Paper control (feed lines, full cut, partial cut)
  - Printer initialization and beep commands
  - Auto-refresh printer status every 3 seconds
  - Responsive dark theme UI
  - Keyboard shortcuts (Ctrl+Enter to send text)
  - Auto-hide success/error messages after 5 seconds
  
  The page communicates with the HTTP server via REST API endpoints:
  - GET /printer/status - Check if printer is connected
  - POST /printer/print - Send text to printer
  - POST /printer/feed - Feed paper (with configurable line count)
  - POST /printer/cut - Cut paper (full or partial)
  - POST /printer/init - Initialize printer
  - POST /printer/beep - Trigger printer beep
  
  The printer must be connected via USB before any commands can be sent.
-->

<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ESP32 Printer Manager</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: #eee;
      padding: 20px;
      margin: 0;
    }
    
    h1, h2 {
      text-align: center;
      color: #0a84ff;
    }
    
    .container {
      max-width: 600px;
      margin: 0 auto;
      background: #1b1b1b;
      padding: 20px;
      border-radius: 8px;
      border: 1px solid #333;
    }
    
    .status-box {
      background: #222;
      padding: 15px;
      border-radius: 5px;
      margin-bottom: 20px;
      text-align: center;
      border: 2px solid #444;
    }
    
    .status-connected {
      border-color: #00ff00;
      background: rgba(0, 255, 0, 0.1);
    }
    
    .status-disconnected {
      border-color: #ff3b30;
      background: rgba(255, 59, 48, 0.1);
    }
    
    .status-text {
      font-size: 18px;
      font-weight: bold;
      margin: 10px 0;
    }
    
    .status-connected .status-text {
      color: #00ff00;
    }
    
    .status-disconnected .status-text {
      color: #ff3b30;
    }
    
    .section {
      margin-bottom: 25px;
    }
    
    .section-title {
      font-size: 14px;
      font-weight: bold;
      color: #0a84ff;
      margin-bottom: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    
    input,
    textarea,
    button,
    select {
      display: block;
      width: 100%;
      padding: 12px;
      margin: 5px 0;
      font-size: 14px;
      border: 1px solid #444;
      background: #222;
      color: #eee;
      border-radius: 4px;
      box-sizing: border-box;
    }
    
    input:focus,
    textarea:focus,
    select:focus {
      outline: none;
      border-color: #0a84ff;
      background: #1a1a2e;
    }
    
    button {
      cursor: pointer;
      background: #0a84ff;
      color: white;
      border: none;
      font-weight: bold;
      transition: background 0.3s;
      margin-top: 10px;
    }
    
    button:hover {
      background: #0057cc;
    }
    
    button:disabled {
      background: #666;
      cursor: not-allowed;
    }
    
    .button-group {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    
    .button-group button {
      width: 100%;
      margin: 0;
    }
    
    .danger {
      background: #ff3b30;
    }
    
    .danger:hover {
      background: #cc1f1f;
    }
    
    .success {
      background: #00aa44;
    }
    
    .success:hover {
      background: #007733;
    }
    
    .warning {
      background: #ff9500;
    }
    
    .warning:hover {
      background: #cc7700;
    }
    
    textarea {
      resize: vertical;
      min-height: 120px;
      font-family: 'Courier New', monospace;
    }
    
    .message-box {
      padding: 12px;
      margin: 10px 0;
      border-radius: 4px;
      display: none;
    }
    
    .message-success {
      background: rgba(0, 255, 0, 0.2);
      border: 1px solid #00ff00;
      color: #00ff00;
    }
    
    .message-error {
      background: rgba(255, 59, 48, 0.2);
      border: 1px solid #ff3b30;
      color: #ff3b30;
    }
    
    .message-info {
      background: rgba(10, 132, 255, 0.2);
      border: 1px solid #0a84ff;
      color: #0a84ff;
    }
    
    .info-text {
      font-size: 12px;
      color: #aaa;
      margin-top: 5px;
    }
    
    .link {
      color: #0a84ff;
      text-decoration: none;
      cursor: pointer;
    }
    
    .link:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>Printer Manager</h1>
  
  <!-- Status Section -->
  <div class="status-box" id="statusBox">
    <div class="status-text">Checking printer status...</div>
  </div>
  
  <div id="messageBox" class="message-box"></div>

  <!-- Print Text Section -->
  <div class="section">
    <div class="section-title">Print Text</div>
    <textarea id="printText" placeholder="Enter text to print..."></textarea>
    <button onclick="printText()" id="printBtn" disabled>Send to Printer</button>
    <div class="info-text">Max 256 characters per message</div>
  </div>

  <!-- Printer Control Section -->
  <div class="section">
    <div class="section-title">Printer Controls</div>
    
    <div class="button-group">
      <button class="success" onclick="initPrinter()" id="initBtn" disabled>Initialize</button>
      <button class="warning" onclick="beepPrinter()" id="beepBtn" disabled>Beep</button>
    </div>
  </div>

  <!-- Paper Control Section -->
  <div class="section">
    <div class="section-title">Paper Controls</div>
    
    <label for="feedLines" style="color: #aaa; font-size: 12px;">Number of lines to feed:</label>
    <input type="number" id="feedLines" value="1" min="1" max="255" style="margin-bottom: 5px;">
    <button class="success" onclick="feedPaper()" id="feedBtn" disabled>Feed Paper</button>
    
    <div class="button-group" style="margin-top: 10px;">
      <button class="danger" onclick="cutPaper(true)" id="cutPartialBtn" disabled>Cut (Partial)</button>
      <button class="danger" onclick="cutPaper(false)" id="cutFullBtn" disabled>Cut (Full)</button>
    </div>
  </div>

  <!-- Status Refresh Section -->
  <div class="section">
    <button onclick="refreshStatus()" style="background: #444;">Refresh Status</button>
  </div>

  <!-- WiFi Link Section -->
  <div class="section" style="text-align: center; margin-top: 30px; padding-top: 20px; border-top: 1px solid #333;">
    <span class="info-text">
      Need to configure WiFi? <span class="link" onclick="goToWiFi()">WiFi Settings</span>
    </span>
  </div>
</div>

<script>
  // Configuration
  const API_BASE = '';
  const STATUS_CHECK_INTERVAL = 3000; // 3 seconds
  let statusCheckInterval = null;

  // Initialize on page load
  window.onload = function() {
    refreshStatus();
    // Auto-refresh status
    statusCheckInterval = setInterval(refreshStatus, STATUS_CHECK_INTERVAL);
  };

  // Show message
  function showMessage(text, type = 'info') {
    const box = document.getElementById('messageBox');
    box.textContent = text;
    box.className = 'message-box message-' + type;
    box.style.display = 'block';
    
    // Auto-hide after 5 seconds
    setTimeout(() => {
      box.style.display = 'none';
    }, 5000);
  }

  // Refresh printer status
  function refreshStatus() {
    fetch(`${API_BASE}/printer/status`)
      .then(r => r.json())
      .then(data => {
        updateStatusDisplay(data.connected);
      })
      .catch(err => {
        console.error('Status check failed:', err);
        updateStatusDisplay(false);
      });
  }

  // Update status display
  function updateStatusDisplay(connected) {
    const statusBox = document.getElementById('statusBox');
    const buttons = document.querySelectorAll('button[disabled], button[id*="Btn"]');
    
    if (connected) {
      statusBox.className = 'status-box status-connected';
      statusBox.innerHTML = '<div class="status-text">Printer Connected</div><div class="info-text">Ready to print</div>';
      
      // Enable all printer buttons
      document.getElementById('printBtn').disabled = false;
      document.getElementById('initBtn').disabled = false;
      document.getElementById('beepBtn').disabled = false;
      document.getElementById('feedBtn').disabled = false;
      document.getElementById('cutPartialBtn').disabled = false;
      document.getElementById('cutFullBtn').disabled = false;
    } else {
      statusBox.className = 'status-box status-disconnected';
      statusBox.innerHTML = '<div class="status-text">Printer Disconnected</div><div class="info-text">Connect a USB printer and refresh</div>';
      
      // Disable all printer buttons
      document.getElementById('printBtn').disabled = true;
      document.getElementById('initBtn').disabled = true;
      document.getElementById('beepBtn').disabled = true;
      document.getElementById('feedBtn').disabled = true;
      document.getElementById('cutPartialBtn').disabled = true;
      document.getElementById('cutFullBtn').disabled = true;
    }
  }

  // Send text to printer
  function printText() {
    const text = document.getElementById('printText').value.trim();
    
    if (!text) {
      showMessage('Please enter text to print', 'error');
      return;
    }
    
    if (text.length > 256) {
      showMessage('Text too long (max 256 characters)', 'error');
      return;
    }

    fetch(`${API_BASE}/printer/print`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: `text=${encodeURIComponent(text)}`
    })
    .then(r => r.json())
    .then(data => {
      if (data.error) {
        showMessage('Error: ' + data.error, 'error');
      } else {
        showMessage('Text sent to printer', 'success');
        document.getElementById('printText').value = '';
      }
    })
    .catch(err => showMessage('Failed to send text: ' + err.message, 'error'));
  }

  // Feed paper
  function feedPaper() {
    const lines = parseInt(document.getElementById('feedLines').value) || 1;
    
    fetch(`${API_BASE}/printer/feed`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: `lines=${lines}`
    })
    .then(r => r.json())
    .then(data => {
      if (data.error) {
        showMessage('Error: ' + data.error, 'error');
      } else {
        showMessage(`Fed ${lines} line(s)`, 'success');
      }
    })
    .catch(err => showMessage('Failed to feed paper: ' + err.message, 'error'));
  }

  // Cut paper
  function cutPaper(partial) {
    const cutType = partial ? 'Partial' : 'Full';
    
    fetch(`${API_BASE}/printer/cut`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: partial ? 'partial=1' : 'partial=0'
    })
    .then(r => r.json())
    .then(data => {
      if (data.error) {
        showMessage('Error: ' + data.error, 'error');
      } else {
        showMessage(`${cutType} cut executed`, 'success');
      }
    })
    .catch(err => showMessage('Failed to cut paper: ' + err.message, 'error'));
  }

  // Initialize printer
  function initPrinter() {
    fetch(`${API_BASE}/printer/init`, {
      method: 'POST'
    })
    .then(r => r.json())
    .then(data => {
      if (data.error) {
        showMessage('Error: ' + data.error, 'error');
      } else {
        showMessage('Printer initialized', 'success');
      }
    })
    .catch(err => showMessage('Failed to initialize: ' + err.message, 'error'));
  }

  // Beep printer
  function beepPrinter() {
    fetch(`${API_BASE}/printer/beep`, {
      method: 'POST'
    })
    .then(r => r.json())
    .then(data => {
      if (data.error) {
        showMessage('Error: ' + data.error, 'error');
      } else {
        showMessage('Beep sent', 'success');
      }
    })
    .catch(err => showMessage('Failed to beep: ' + err.message, 'error'));
  }

  // Navigate to WiFi settings
  function goToWiFi() {
    window.location.href = '/';
  }

  // Keyboard shortcuts
  document.addEventListener('keydown', function(e) {
    // Ctrl+Enter to send text
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
      const printText = document.getElementById('printText');
      if (document.activeElement === printText && !document.getElementById('printBtn').disabled) {
        printText();
      }
    }
  });

  // Clean up interval on page unload
  window.onbeforeunload = function() {
    if (statusCheckInterval) {
      clearInterval(statusCheckInterval);
    }
  };
</script>

</body>
</html>
